<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Personal Website | Contact Me</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #34495e;
            position: sticky;
            top: 0;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0;
            padding: 14px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        nav ul {
            margin-left: 0;
            padding-left: 0;
            display: flex;
            list-style: none;
            gap: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 25px;
        }

        nav a.active {
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        nav a:hover {
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
        }

        .content {
            background: white;
            padding: 50px;
            border-radius: 15px;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .contact-list {
            margin-top: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f9f9f9;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .contact-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .contact-item i {
            font-size: 20px;
            color: #2c3e50;
        }

        .contact-item a {
            color: black;
            text-decoration: none;
            font-size: 18px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
        }

        footer p {
            font-size: 18px;
        }

    </style>

</head>

<body>

<header>
    <h1>Zyrell Grace De Guia</h1>
    <h3>BS Information Technology with Specialization in Mobile and Web Applications</h3>
</header>

<nav>
    <div class="nav-container">
        <ul>
            <li><a href="index.html">About Me</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </div>
</nav>

<section id="contact">
    <div class="content">
        <h2>Contact Me</h2>

        <div class="contact-list">

            <div class="contact-item">
                <i class="fas fa-envelope"></i>
                <a>zyrellgracedeguia0814@gmail.com</a>
            </div>

            <div class="contact-item">
                <i class="fas fa-phone"></i>
                <a>0949 966 0572</a>
            </div>

            <div class="contact-item">
                <i class="fab fa-linkedin"></i>
                <a href="https://www.linkedin.com/in/zyrell-grace-d-2230ab2a9/">Zyrell Grace De Guia</a>
            </div>

        </div>
    </div>
</section>

<footer>
    <p>© 2026 National University - Manila. Web Systems and Technologies. All rights reserved.</p>
</footer>

</body>
</html>
